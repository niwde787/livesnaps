      :root, [data-theme="dark"] {
        /* Modern Dark Theme (Inspired by user image) */

        /* Backgrounds */
        --bg-primary: #0D1117;      /* Very dark, slightly blue charcoal */
        --bg-secondary: #161B22;     /* Lighter card background */
        --bg-tertiary: #21262D;      /* Lighter for hovers/active */
        --bg-glass-effect: rgba(22, 27, 34, 0.7);
        
        /* Borders */
        --border-primary: #30363D;   /* Subtle border color */

        /* Text */
        --text-primary: #C9D1D9;      /* Light grey, not pure white */
        --text-secondary: #8B949E;   /* Medium grey */
        
        /* Accents */
        --accent-primary: #58A6FF;   /* Bright, accessible blue */
        --accent-primary-hover: #388BFD;
        --accent-button-primary: var(--accent-primary);
        --accent-button-primary-hover: var(--accent-primary-hover);
        --accent-button-text-color: #0D1117; /* Dark text on bright blue button for contrast */
        
        --accent-secondary: #238636;      /* Vibrant Green (Offense) */
        --accent-secondary-hover: #2EA043;
        
        --accent-defense: #DA3633;        /* Strong Red (Defense) */
        --accent-defense-hover: #F85149;
        
        --accent-special: #8957E5;        /* Vibrant Purple (Special Teams) */
        --accent-special-hover: #A475F5;

        /* Semantic & Status */
        --accent-danger: #DA3633;
        --accent-danger-hover: #C92E2B;
        --accent-warning: #F5A623;
        
        --status-playing: var(--accent-primary);
        --status-injured: var(--accent-danger);
        --status-absent: var(--accent-warning);
        --status-discipline: var(--accent-special);
        
        --status-playing-text: #FFFFFF;
        --status-injured-text: #FFFFFF;
        --status-absent-text: #111827;
        --status-discipline-text: #FFFFFF;
        
        --font-family-sans: 'Inter', sans-serif;

        --icon-rotate-fill: var(--accent-primary);
        --logo-color: var(--accent-secondary);
      }

      [data-theme="light"] {
        /* Modern Light Theme (Inspired by user image) */

        /* Backgrounds */
        --bg-primary: #F0F2F5;      /* Light grey background */
        --bg-secondary: #FFFFFF;     /* White for cards */
        --bg-tertiary: #E4E6EB;     /* Light grey for hovers/dividers */
        --bg-glass-effect: rgba(255, 255, 255, 0.8);
        
        /* Borders */
        --border-primary: #DADDE1;   /* Subtle grey border */

        /* Text */
        --text-primary: #050505;      /* Almost black for max contrast */
        --text-secondary: #65676B;   /* Medium grey */
        
        /* Accents */
        --accent-primary: #1877F2;        /* Strong, standard Blue */
        --accent-primary-hover: #166FE5;
        --accent-button-primary: var(--accent-primary);
        --accent-button-primary-hover: var(--accent-primary-hover);
        --accent-button-text-color: #FFFFFF;
        
        /* Functional color-coding for play types */
        --accent-secondary: #31A24C;      /* Strong Green for Offense */
        --accent-secondary-hover: #2B8A40;
        
        --accent-defense: #FA383E;        /* Strong Red for Defense */
        --accent-defense-hover: #E32D32;
        
        --accent-special: #8A3AB9;        /* Strong Purple for Special Teams */
        --accent-special-hover: #7E22CE;

        /* Semantic & Status */
        --accent-danger: #FA383E;
        --accent-danger-hover: #E32D32;
        --accent-warning: #F97316;
        
        --status-playing: var(--accent-primary);
        --status-injured: var(--accent-danger);
        --status-absent: var(--accent-warning);
        --status-discipline: #475569;
        
        --status-playing-text: #FFFFFF;
        --status-injured-text: #FFFFFF;
        --status-absent-text: #111827;
        --status-discipline-text: #FFFFFF;

        --icon-rotate-fill: var(--accent-primary);
        --logo-color: var(--text-primary);
      }

      [data-theme="material-you"] {
        /* Material You (M3) Inspired Dark Theme */

        /* M3 Roles - Primary */
        --m3-primary: #AEC6FF;
        --m3-on-primary: #002E69;
        --m3-primary-container: #004494;
        --m3-on-primary-container: #D8E2FF;

        /* M3 Roles - Secondary */
        --m3-secondary: #C0C6DC;
        --m3-on-secondary: #283141;
        --m3-secondary-container: #3F4759;
        --m3-on-secondary-container: #DCE2F9;

        /* M3 Roles - Tertiary */
        --m3-tertiary: #E0B6F3;
        --m3-on-tertiary: #42294A;
        --m3-tertiary-container: #5A3F61;
        --m3-on-tertiary-container: #FAD7FF;

        /* M3 Roles - Surfaces */
        --m3-background: #1B1B1F;
        --m3-on-background: #E4E2E6;
        --m3-surface: #1B1B1F;
        --m3-on-surface: #E4E2E6;
        --m3-surface-variant: #45464F;
        --m3-on-surface-variant: #C5C6D0;
        --m3-outline: #8F909A;
        --m3-surface-container-highest: #34353A;

        /* M3 Roles - Error */
        --m3-error: #F2B8B5;
        --m3-on-error: #601410;
        --m3-error-container: #8C1D18;
        --m3-on-error-container: #F9DEDC;

        /* Backgrounds */
        --bg-primary: var(--m3-surface);
        --bg-secondary: var(--m3-surface-container-highest);
        --bg-tertiary: var(--m3-surface-variant);
        --bg-glass-effect: rgba(40, 49, 65, 0.7);

        /* Borders */
        --border-primary: var(--m3-outline);

        /* Text */
        --text-primary: var(--m3-on-surface);
        --text-secondary: var(--m3-on-surface-variant);

        /* Accents */
        --accent-primary: var(--m3-primary);
        --accent-primary-hover: #D8E2FF;
        --accent-button-primary: var(--m3-primary-container);
        --accent-button-primary-hover: #215fa6;
        --accent-button-text-color: var(--m3-on-primary-container);


        /* Functional color-coding */
        --accent-secondary: #74D98B; /* M3-style Green */
        --accent-secondary-hover: #5EC774;
        
        --accent-defense: var(--m3-error-container);
        --accent-defense-hover: #a12e28;
        
        --accent-special: var(--m3-tertiary);
        --accent-special-hover: #E8C8F8;

        /* Semantic & Status */
        --accent-danger: var(--m3-error);
        --accent-danger-hover: #F6C8C5;
        --accent-warning: #FFB86F;
        
        --status-playing: var(--accent-primary);
        --status-injured: var(--accent-danger);
        --status-absent: var(--accent-warning);
        --status-discipline: var(--m3-secondary);
        
        --status-playing-text: var(--m3-on-primary-container);
        --status-injured-text: var(--m3-on-error);
        --status-absent-text: #3D2900;
        --status-discipline-text: var(--m3-on-secondary);

        --icon-rotate-fill: var(--accent-primary);
        --logo-color: var(--accent-primary);

      }
      
      .glass-effect {

        mask-size: contain;
        -webkit-mask-position: center;
        mask-position: center;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        background-color: var(--logo-color);
        transition: all 0.3s ease;
      }
      
      [data-theme="dark"] .logo-img {
        background-image: url(https://raw.githubusercontent.com/niwde787/CJF/1f4df5f83d0fbb85bc6ea1ac8ed36765f518e995/SNAPS_H.svg);
        background-size: contain;
        background-position: center;
        background-repeat: no-repeat;
        background-color: transparent;
        -webkit-mask-image: none;
        mask-image: none;
      }

      .cover-flow-reflect {
        -webkit-box-reflect: below 2px linear-gradient(transparent, transparent, rgba(0, 0, 0, 0.4));
      }
      /* Styles for custom details/summary dropdown */
      details[open] .details-open-rotate {
        transform: rotate(90deg);
      }
      summary {
        list-style: none; /* For Firefox */
      }
      summary::-webkit-details-marker {
        display: none; /* For Chrome */
      }
      /* Ticker Animation */
      @keyframes ticker-scroll {
        from { transform: translateX(0); }
        to { transform: translateX(-50%); }
      }

      @keyframes draw-arrow {
        from { transform: scaleX(0); }
        to { transform: scaleX(1); }
      }

      @keyframes draw-check {
        to {
          stroke-dashoffset: 0;
        }
      }
      .animate-draw-check {
        stroke-dasharray: 24;
        stroke-dashoffset: 24;
        animation: draw-check 0.5s ease-out forwards;
      }

      /* View Transitions */
      @keyframes slide-in-from-right {
        from { transform: translateX(20px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slide-in-from-left {
        from { transform: translateX(-20px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      .animate-slide-in-from-right {
        animation: slide-in-from-right 0.3s ease-out forwards;
      }

      .animate-slide-in-from-left {
        animation: slide-in-from-left 0.3s ease-out forwards;
      }

      .animate-fade-in {
        animation: fade-in 0.3s ease-out forwards;
      }

      /* Splash Screen Styles */
      #splash-screen {
        position: fixed;
        inset: 0;
        background-color: var(--bg-primary);
        z-index: 99999;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 2rem;
        transition: opacity 0.5s ease-in-out;
        opacity: 1;
      }

      #splash-screen.fade-out {
        opacity: 0;
      }

      .splash-logo {
        height: 20vh;
        width: auto;
        animation: pulse 2s infinite cubic-bezier(0.4, 0, 0.6, 1);
      }

      .progress-bar-container {
        width: 200px;
        height: 8px;
        background-color: var(--border-primary);
        border-radius: 4px;
        overflow: hidden;
      }

      .progress-bar-value {
        width: 100%;
        height: 100%;
        background-color: var(--accent-primary);
        transform-origin: left;
        animation: fill-progress 1s ease-out forwards;
      }

      @keyframes fill-progress {
        from { transform: scaleX(0); }
        to { transform: scaleX(1); }
      }

      @keyframes pulse {
        0%, 100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.05);
          opacity: 0.9;
        }
      }

      /* Orientation Overlay */
      #orientation-overlay {
        position: fixed;
        inset: 0;
        background-color: var(--bg-primary);
        color: var(--text-primary);
        z-index: 100000;
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 2rem;
        font-size: 1.2rem;
      }

      .orientation-logo {
        height: 15vh;
        width: auto;
        margin-bottom: 2rem;
      }

      .rotate-icon {
        width: 64px;
        height: 64px;
        margin-bottom: 1.5rem;
        animation: spin-and-back 2.5s ease-in-out infinite;
      }
      
      .rotate-icon .cls-1 {
        fill: var(--icon-rotate-fill);
      }

      @keyframes spin-and-back {
        0% { transform: rotate(0deg); }
        25% { transform: rotate(90deg); }
        75% { transform: rotate(90deg); }
        100% { transform: rotate(0deg); }
      }

      @media (orientation: portrait) {
        body.enforce-landscape #orientation-overlay {
          display: flex;

          display: none !important;

      /* Styles used for PDF export to create a print-friendly format */
      .pdf-export-format {

          // Register the service worker directly with its path. The browser will resolve it.
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }
    </script>
  </body>
</html>
